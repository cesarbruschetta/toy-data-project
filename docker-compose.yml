services:

  # ── LocalStack ──────────────────────────────────────────────────────────────
  # Emula os serviços AWS usados pelo projeto: SNS, SQS e S3.
  # As Lambdas rodam localmente (pytest / linha de comando) e apontam para
  # os endpoints do LocalStack via variáveis de ambiente.

  localstack:
    image: localstack/localstack:3.4
    ports:
      - "4566:4566"       # endpoint único para todos os serviços
    environment:
      - SERVICES=sns,sqs,s3
      - DEFAULT_REGION=us-east-1
      - EAGER_SERVICE_LOADING=1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - ./dev/localstack/init.sh:/etc/localstack/init/ready.d/init.sh:ro
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Sensor Simulator ────────────────────────────────────────────────────────
  # Envia leituras de sensor para o endpoint configurado em API_URL.
  # Por padrão aponta para o LocalStack (via Lambda handler rodando local),
  # mas pode ser redirecionado para o API Gateway AWS trocando API_URL.

  sensor-simulator:
    image: python:3.12-slim
    environment:
      - API_URL=${API_URL:-http://host.docker.internal:9000/temperature}
      - SENSOR_ID=dev_sensor
      - SENSOR_INTERVAL=30
    volumes:
      - ./dev/sensor/simulator_aws.py:/app/simulator.py:ro
    command: ["python", "/app/simulator.py"]
    depends_on:
      localstack:
        condition: service_healthy
    profiles:
      - simulator   # só sobe com: docker compose --profile simulator up

volumes:
  localstack-data:
